<!DOCTYPE html>
<html>
<head>
<title>Calculator Hub Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

h1 {
  padding: 20px;
}

.section {
  background: #1e293b;
  margin: 20px auto;
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  box-shadow: 0 0 10px #000;
}

input {
  width: 90%;
  height: 45px;
  font-size: 18px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  text-align: center;
}

.calc-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  width: 100%;
  height: 60px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
}

button:active {
  background: #16a34a;
}

.big-btn {
  width: 100%;
  height: 50px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🔥 Calculator Hub Pro</h1>

<!-- BASIC CALCULATOR -->
<div class="section">
<h2>Basic Calculator</h2>

<input type="text" id="result" disabled>

<div class="calc-grid">
<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">/</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')">*</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">-</button>

<button onclick="add('0')">0</button>
<button onclick="calculate()">=</button>
<button onclick="clearResult()">C</button>
<button onclick="add('+')">+</button>
</div>
</div>

<!-- PERCENTAGE -->
<div class="section">
<h2>Percentage Calculator</h2>
<input type="number" id="num" placeholder="Enter number">
<input type="number" id="percent" placeholder="Enter %">
<button class="big-btn" onclick="calcPercent()">Calculate</button>
<h3 id="percentResult"></h3>
</div>

<!-- AGE -->
<div class="section">
<h2>Age Calculator</h2>
<input type="date" id="dob">
<button class="big-btn" onclick="calcAge()">Find Age</button>
<h3 id="ageResult"></h3>
</div>

<!-- BMI -->
<div class="section">
<h2>BMI Calculator</h2>
<input type="number" id="weight" placeholder="Weight (kg)">
<input type="number" id="height" placeholder="Height (cm)">
<button class="big-btn" onclick="calcBMI()">Check BMI</button>
<h3 id="bmiResult"></h3>
</div>

<script>
function add(val){
  document.getElementById("result").value += val;
}

function calculate(){
  let x = document.getElementById("result").value;
  document.getElementById("result").value = eval(x);
}

function clearResult(){
  document.getElementById("result").value = "";
}

function calcPercent(){
  let num = document.getElementById("num").value;
  let per = document.getElementById("percent").value;
  let res = (num * per) / 100;
  document.getElementById("percentResult").innerText = "Result: " + res;
}

function calcAge(){
  let dob = new Date(document.getElementById("dob").value);
  let today = new Date();
  let age = today.getFullYear() - dob.getFullYear();
  document.getElementById("ageResult").innerText = "Age: " + age + " years";
}

function calcBMI(){
  let w = document.getElementById("weight").value;
  let h = document.getElementById("height").value / 100;
  let bmi = (w / (h*h)).toFixed(2);
  document.getElementById("bmiResult").innerText = "BMI: " + bmi;
}
</script>

</body>
</html>
